<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة كيمياء التحصيلي 🧪</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #27ae60;
            --bg-color: #f4f7f9;
            --card-bg: #ffffff;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: #333;
        }

        .main-container {
            width: 100%;
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            max-width: 1200px;
            text-align: center;
            background: white;
            padding: 30px 20px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 40px;
            border-bottom: 4px solid var(--primary);
        }

        header h1 { font-size: 1.8rem; margin: 0; color: #2c3e50; }
        header p { font-size: 1.2rem; margin: 15px 0; color: #27ae60; font-weight: bold; }
        
        .slogan {
            font-size: 0.95rem;
            color: #7f8c8d;
            font-style: italic;
            margin-top: 10px;
        }

        .search-area {
            width: 100%;
            max-width: 500px;
            margin-bottom: 40px;
        }

        #searchBox {
            width: 100%;
            padding: 15px 25px;
            border-radius: 50px;
            border: 2px solid #ddd;
            font-family: 'Tajawal', sans-serif;
            font-size: 1rem;
            outline: none;
            text-align: center;
            transition: all 0.3s ease;
        }

        #searchBox:focus {
            border-color: var(--primary);
            box-shadow: 0 5px 15px rgba(39, 174, 96, 0.1);
        }

        .models-grid {
            display: grid;
            width: 100%;
            max-width: 1400px;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 18px;
            padding: 25px 15px;
            text-decoration: none;
            color: #333;
            border: 1px solid #edf2f7;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        .card .icon { font-size: 48px; margin-bottom: 15px; }
        .card span { font-weight: bold; font-size: 1.1rem; text-align: center; }

        footer {
            padding: 25px;
            text-align: center;
            background: #fff;
            color: #888;
            font-size: 0.85rem;
            border-top: 1px solid #eee;
        }

        @media (max-width: 600px) {
            .models-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }
            header h1 { font-size: 1.4rem; }
            header p { font-size: 1rem; }
            .card { padding: 20px 10px; }
            .card .icon { font-size: 38px; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <header>
            <h1>بوابة الاختبارات الرقمية ⚗️</h1>
            <p>نحو العلامة الكاملة في كيمياء التحصيلي 💯</p>
            <div class="slogan">"الكيمياء ليست مجرد مادة، بل هي تفاعل معرفتك مع الإصرار لتحقيق النجاح" 🚀</div>
        </header>

        <div class="search-area">
            <input type="text" id="searchBox" placeholder="🔍 ابحث برقم النموذج..." onkeyup="filterModels()">
        </div>

        <div class="models-grid" id="modelsGrid"></div>
    </div>

    <footer>
        جميع الحقوق محفوظة 2026 © <br>
        <span style="font-size: 0.75rem; margin-top: 5px; display: block;">مع تمنياتنا لجميع الطلاب بالتوفيق والتميز في اختبار التحصيلي ✨</span>
    </footer>

    <script>
        const myModels = [
            { title: "نموذج ١", link: "https://thsyly4.github.io/thsyly4.1/", icon: "🧪" },
            { title: "نموذج ٢", link: "https://thsyly4.github.io/thsyly4.2/", icon: "🔬" },
            { title: "نموذج ٣", link: "https://thsyly4.github.io/aaa3/", icon: "⚗️" },
            { title: "نموذج ٤", link: "https://thsyly4.github.io/thsyly4.4", icon: "💧" },
            { title: "نموذج ٥", link: "https://thsyly4.github.io/thsyly4.5", icon: "💡" },
            { title: "نموذج ٦", link: "#", icon: "📝" }, 
        ];

        function displayModels() {
            const grid = document.getElementById('modelsGrid');
            grid.innerHTML = myModels.map(model => `
                <a href="${model.link}" class="card">
                    <div class="icon">${model.icon}</div>
                    <span>${model.title}</span>
                </a>
            `).join('');
        }

        function filterModels() {
            let input = document.getElementById('searchBox').value.toLowerCase();
            let cards = document.getElementsByClassName('card');
            for (let i = 0; i < cards.length; i++) {
                let title = cards[i].innerText.toLowerCase();
                if (title.includes(input)) {
                    cards[i].style.display = "flex";
                } else {
                    cards[i].style.display = "none";
                }
            }
        }

        displayModels();
    </script>

</body>
</html>
